services:
  api:
    container_name: librechat-fibbo
    image: librechat-fibbo:latest
    restart: always
    ports:
      - "${PORT:-3080}:${PORT:-3080}"
    depends_on:
      - rag_api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=${MONGO_URI}
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
    volumes:
      - ./.env:/app/.env:ro
      - ./librechat.yaml:/app/librechat.yaml:ro
      - ./uploads:/app/uploads
      - ./images:/app/client/public/images
      - ./logs:/app/api/logs
    networks:
      - default
      - 4leads_network
    labels:
      - "stack=fibbo"

  meilisearch:
    container_name: meilisearch-fibbo
    image: getmeili/meilisearch:v1.35.1
    restart: always
    user: "${UID}:${GID}"
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - ./meili_data_v1.35.1:/meili_data
    networks:
      - default

  vectordb:
    container_name: vectordb-fibbo
    image: pgvector/pgvector:0.8.0-pg15-trixie
    restart: always
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pgdata-fibbo:/var/lib/postgresql/data
    networks:
      - default

  rag_api:
    container_name: rag-fibbo
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
    restart: always
    depends_on:
      - vectordb
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
    env_file:
      - .env
    networks:
      - default

volumes:
  pgdata-fibbo:

networks:
  default:
  4leads_network:
    external: true
